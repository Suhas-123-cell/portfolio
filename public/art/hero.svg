<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0a1a35"/>
      <stop offset="60%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#030609"/>
    </radialGradient>
    <radialGradient id="glow-teal" cx="65%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#00d9c4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d9c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="20%" cy="85%" r="30%">
      <stop offset="0%" stop-color="#ff7a2f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff7a2f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="60%" stop-color="#071528"/>
      <stop offset="100%" stop-color="#001a14"/>
    </linearGradient>
    <filter id="blur-soft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#horizon)"/>
  <rect width="1920" height="1080" fill="url(#glow-teal)"/>
  <rect width="1920" height="1080" fill="url(#glow-orange)"/>

  <!-- Stars small -->
  <g fill="white" opacity="0.55">
    <circle cx="120" cy="80" r="0.8"/><circle cx="245" cy="45" r="0.6"/><circle cx="380" cy="120" r="0.9"/>
    <circle cx="490" cy="60" r="0.7"/><circle cx="600" cy="95" r="0.8"/><circle cx="720" cy="30" r="0.6"/>
    <circle cx="850" cy="110" r="0.9"/><circle cx="960" cy="55" r="0.7"/><circle cx="1080" cy="85" r="0.8"/>
    <circle cx="1200" cy="40" r="0.6"/><circle cx="1340" cy="100" r="0.9"/><circle cx="1460" cy="70" r="0.7"/>
    <circle cx="1580" cy="45" r="0.8"/><circle cx="1700" cy="115" r="0.6"/><circle cx="1820" cy="80" r="0.9"/>
    <circle cx="160" cy="200" r="0.6"/><circle cx="300" cy="170" r="0.8"/><circle cx="440" cy="210" r="0.7"/>
    <circle cx="560" cy="185" r="0.9"/><circle cx="680" cy="155" r="0.6"/><circle cx="800" cy="220" r="0.8"/>
    <circle cx="920" cy="175" r="0.7"/><circle cx="1040" cy="195" r="0.9"/><circle cx="1160" cy="165" r="0.6"/>
    <circle cx="1280" cy="205" r="0.8"/><circle cx="1400" cy="180" r="0.7"/><circle cx="1520" cy="215" r="0.6"/>
    <circle cx="1640" cy="195" r="0.9"/><circle cx="1760" cy="170" r="0.8"/><circle cx="1880" cy="200" r="0.7"/>
    <circle cx="70" cy="290" r="0.6"/><circle cx="200" cy="310" r="0.8"/><circle cx="330" cy="280" r="0.7"/>
    <circle cx="460" cy="320" r="0.9"/><circle cx="590" cy="295" r="0.6"/><circle cx="730" cy="305" r="0.8"/>
    <circle cx="870" cy="275" r="0.7"/><circle cx="1010" cy="315" r="0.9"/><circle cx="1150" cy="290" r="0.6"/>
    <circle cx="1290" cy="310" r="0.8"/><circle cx="1430" cy="280" r="0.7"/><circle cx="1570" cy="300" r="0.9"/>
    <circle cx="1710" cy="275" r="0.6"/><circle cx="1850" cy="295" r="0.8"/>
  </g>

  <!-- Stars bright -->
  <g fill="white" opacity="0.9" filter="url(#blur-soft)">
    <circle cx="200" cy="130" r="1.5"/><circle cx="650" cy="55" r="1.8"/>
    <circle cx="1100" cy="95" r="1.5"/><circle cx="1500" cy="40" r="1.8"/>
    <circle cx="1750" cy="140" r="1.5"/><circle cx="400" cy="250" r="1.8"/>
    <circle cx="900" cy="200" r="1.5"/><circle cx="1350" cy="260" r="1.8"/>
  </g>

  <!-- Mountain silhouettes -->
  <path d="M0 780 L200 500 L380 640 L540 450 L720 600 L900 480 L1080 560 L1260 420 L1440 580 L1620 460 L1800 540 L1920 500 L1920 1080 L0 1080Z" fill="#050a16" opacity="0.9"/>
  <path d="M0 850 L180 660 L320 730 L480 580 L660 700 L820 600 L1000 680 L1160 560 L1340 650 L1500 570 L1680 640 L1840 580 L1920 620 L1920 1080 L0 1080Z" fill="#040910" opacity="0.95"/>
  <rect x="0" y="920" width="1920" height="160" fill="#030710" opacity="0.98"/>

  <!-- Horizon line glow -->
  <rect x="0" y="845" width="1920" height="8" fill="#00d9c4" opacity="0.05"/>

  <!-- Geometric accents -->
  <g transform="translate(1650,140)" opacity="0.1" stroke="#00d9c4" stroke-width="1" fill="none">
    <polygon points="0,-38 32.9,19 -32.9,19"/>
    <polygon points="0,-54 46.8,27 -46.8,27"/>
  </g>
  <g transform="translate(180,480)" opacity="0.07" stroke="#4afa96" stroke-width="0.8" fill="none">
    <rect x="-28" y="-28" width="56" height="56" transform="rotate(45)"/>
    <rect x="-40" y="-40" width="80" height="80" transform="rotate(45)"/>
  </g>

  <!-- Energy orbs -->
  <circle cx="400" cy="420" r="3" fill="#4afa96" opacity="0.3" filter="url(#blur-soft)"/>
  <circle cx="900" cy="350" r="2" fill="#00d9c4" opacity="0.4" filter="url(#blur-soft)"/>
  <circle cx="1500" cy="380" r="2.5" fill="#4afa96" opacity="0.25" filter="url(#blur-soft)"/>
  <circle cx="700" cy="480" r="1.5" fill="#ff7a2f" opacity="0.35" filter="url(#blur-soft)"/>
  <circle cx="1300" cy="440" r="2" fill="#ff7a2f" opacity="0.25" filter="url(#blur-soft)"/>
</svg>
